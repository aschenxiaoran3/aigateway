<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Knowledge OS 规范编辑</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; display: flex; height: 100vh; }
    #sidebar { width: 280px; border-right: 1px solid #ccc; overflow: auto; padding: 8px; background: #f8f8f8; }
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #toolbar { padding: 8px; border-bottom: 1px solid #ccc; display: flex; gap: 8px; align-items: center; }
    textarea { flex: 1; width: 100%; border: none; padding: 12px; font-family: ui-monospace, monospace; font-size: 13px; resize: none; }
    button { padding: 6px 12px; cursor: pointer; }
    .file { cursor: pointer; padding: 4px 6px; border-radius: 4px; }
    .file:hover { background: #e0e0e0; }
    .file.active { background: #cce5ff; }
    #status { font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h3 style="margin:8px 0;">Knowledge OS</h3>
    <div id="files"></div>
  </div>
  <div id="main">
    <div id="toolbar">
      <span id="pathLabel"></span>
      <button type="button" id="reload">重新加载</button>
      <button type="button" id="save">保存</button>
      <span id="status"></span>
    </div>
    <textarea id="editor" spellcheck="false"></textarea>
  </div>
  <script>
    const API = '/api/v1/deepwiki/knowledge-os';
    let currentPath = '';

    async function loadFiles() {
      const r = await fetch(API + '/files');
      const j = await r.json();
      const el = document.getElementById('files');
      el.innerHTML = '';
      (j.data.files || []).forEach((f) => {
        const d = document.createElement('div');
        d.className = 'file';
        d.textContent = f;
        d.onclick = () => openFile(f);
        el.appendChild(d);
      });
    }

    async function openFile(p) {
      currentPath = p;
      document.querySelectorAll('.file').forEach((n) => n.classList.toggle('active', n.textContent === p));
      document.getElementById('pathLabel').textContent = p;
      document.getElementById('status').textContent = '加载中…';
      const r = await fetch(API + '/file?path=' + encodeURIComponent(p));
      const j = await r.json();
      if (!j.success) {
        document.getElementById('status').textContent = j.error || '失败';
        return;
      }
      document.getElementById('editor').value = j.data.content || '';
      document.getElementById('status').textContent = '已加载';
    }

    document.getElementById('reload').onclick = () => openFile(currentPath);
    document.getElementById('save').onclick = async () => {
      if (!currentPath) return;
      document.getElementById('status').textContent = '保存中…';
      const r = await fetch(API + '/file', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: currentPath, content: document.getElementById('editor').value }),
      });
      const j = await r.json();
      document.getElementById('status').textContent = j.success ? '已保存' : (j.error || '保存失败');
    };

    loadFiles().then(() => document.getElementById('status').textContent = '选择左侧文件');
  </script>
</body>
</html>
